name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nf-core/setup-nextflow@v2
        with:
          version: "latest-stable"
      - name: Check Nextflow syntax
        run: nextflow run main.nf --help || true

  stub-run:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: nf-core/setup-nextflow@v2
        with:
          version: "latest-stable"

      - name: Generate synthetic test data
        run: python3 test/generate_test_data.py

      - name: Stub run
        run: |
          nextflow run main.nf \
            -profile test \
            -stub-run \
            --outdir stub_results

      - name: Upload trace
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stub-trace
          path: stub_results/pipeline_info/
